<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <!-- clock — top-left -->
  <g fill="none" stroke="#0a0e0a" stroke-opacity="0.16" stroke-width="2" stroke-linecap="round">
    <circle cx="40" cy="40" r="21" />
    <line x1="40" y1="21" x2="40" y2="25" />
    <line x1="59" y1="40" x2="55" y2="40" />
    <line x1="40" y1="59" x2="40" y2="55" />
    <line x1="21" y1="40" x2="25" y2="40" />
    <line x1="40" y1="40" x2="40" y2="30" />
    <line x1="40" y1="40" x2="48" y2="44" />
  </g>
  <!-- clock — bottom-right -->
  <g transform="translate(80,80)" fill="none" stroke="#0a0e0a" stroke-opacity="0.16" stroke-width="2" stroke-linecap="round">
    <circle cx="40" cy="40" r="21" />
    <line x1="40" y1="21" x2="40" y2="25" />
    <line x1="59" y1="40" x2="55" y2="40" />
    <line x1="40" y1="59" x2="40" y2="55" />
    <line x1="21" y1="40" x2="25" y2="40" />
    <line x1="40" y1="40" x2="40" y2="30" />
    <line x1="40" y1="40" x2="48" y2="44" />
  </g>
  <!-- coin — top-right -->
  <g transform="translate(80,0)">
    <circle cx="40" cy="40" r="21" fill="none" stroke="#12a150" stroke-opacity="0.26" stroke-width="2" />
    <circle cx="40" cy="40" r="15" fill="none" stroke="#12a150" stroke-opacity="0.26" stroke-width="1.4" />
    <text x="40" y="47" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="19" font-weight="700" fill="#12a150" fill-opacity="0.26">$</text>
  </g>
  <!-- coin — bottom-left -->
  <g transform="translate(0,80)">
    <circle cx="40" cy="40" r="21" fill="none" stroke="#12a150" stroke-opacity="0.26" stroke-width="2" />
    <circle cx="40" cy="40" r="15" fill="none" stroke="#12a150" stroke-opacity="0.26" stroke-width="1.4" />
    <text x="40" y="47" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="19" font-weight="700" fill="#12a150" fill-opacity="0.26">$</text>
  </g>
</svg>
