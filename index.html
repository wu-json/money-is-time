<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Money is Time</title>
    <meta
      name="description"
      content="See the price of everyday things as the time you'd have to work to afford them."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__text">
        <h1 class="title">
          <span class="title-line"
            >Time is money<span class="accent">.</span></span
          >
          <span class="title-line title-line--q">But what if</span>
          <span class="title-line title-line--emph"
            >Money is <span class="gradient-text">Time</span></span
          >
        </h1>
      </div>
    </header>

    <main class="layout">
      <section id="controls" class="panel" aria-label="Your inputs"></section>
      <section id="items" class="grid" aria-label="Goods as time"></section>
      <section
        id="comparison"
        class="panel"
        aria-label="Wealth comparison"
      ></section>
    </main>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
