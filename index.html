<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Money is Time</title>
    <meta
      name="description"
      content="See the price of everyday things as the time you'd have to work to afford them."
    />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <h1 class="title">
        <span class="title-line">Time is money<span class="accent">.</span></span>
        <span class="title-line title-line--q"
          >But what if money was time<span class="qmark"
            ><span class="qmark-base">?</span
            ><span class="qmark-dot" aria-hidden="true">?</span></span
          ></span
        >
      </h1>
    </header>

    <main class="layout">
      <section id="controls" class="panel" aria-label="Your inputs"></section>
      <section id="items" class="grid" aria-label="Goods as time"></section>
      <section
        id="comparison"
        class="panel"
        aria-label="Wealth comparison"
      ></section>
    </main>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
