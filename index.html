<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Money is Time</title>
    <meta
      name="description"
      content="See the price of everyday things as the time you'd have to work to afford them."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero-pre">
        <figure class="hero-quote">
          <blockquote class="hero-quote-text">&ldquo;Time is money.&rdquo;</blockquote>
        </figure>
        <p class="hero-lead">But what if&hellip;</p>
      </div>
      <h1 class="hero-statement">Money is Time</h1>
    </header>

    <main class="layout">
      <section id="controls" class="panel" aria-label="Your inputs"></section>
      <section id="items" class="grid" aria-label="Goods as time"></section>
      <section
        id="comparison"
        class="panel"
        aria-label="Wealth comparison"
      ></section>
    </main>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
