<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>Money is Time</title>
    <meta
      name="description"
      content="See the price of everyday things as the time you'd have to work to afford them."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,900;1,9..144,400&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero-pre">
        <blockquote class="hero-quote-text">&ldquo;Time is money.&rdquo;</blockquote>
        <span class="hero-cite">Benjamin Franklin, 1748</span>
      </div>
      <div class="hero-main">
        <div class="hero-mark" aria-hidden="true">
          <svg
            class="clock"
            viewBox="0 0 240 240"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <!-- a coin that keeps time: thin rim, four marks, a slow hand -->
            <circle class="clock-rim" cx="120" cy="120" r="104" />
            <g class="clock-ticks">
              <line class="clock-tick" x1="120" y1="30" x2="120" y2="46" />
              <line class="clock-tick" x1="210" y1="120" x2="194" y2="120" />
              <line class="clock-tick" x1="120" y1="210" x2="120" y2="194" />
              <line class="clock-tick" x1="30" y1="120" x2="46" y2="120" />
            </g>
            <line
              class="clock-hand"
              x1="120"
              y1="120"
              x2="78"
              y2="98"
              stroke-width="6"
            />
            <g class="clock-sweep">
              <line
                class="clock-hand"
                x1="120"
                y1="132"
                x2="120"
                y2="52"
                stroke-width="4"
              />
            </g>
            <circle class="clock-hub" cx="120" cy="120" r="7" />
          </svg>
        </div>

        <h1 class="hero-statement">Money is <span class="accent">Time</span></h1>
      </div>
      <a class="hero-scroll" href="#controls" aria-label="Scroll down">
        <span class="hero-scroll-line" aria-hidden="true"></span>
      </a>
    </header>

    <main class="layout">
      <section id="controls" class="panel" aria-label="Your inputs"></section>
      <section id="items" aria-label="Goods as time"></section>
      <section
        id="comparison"
        class="panel"
        aria-label="Wealth comparison"
      ></section>
    </main>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
