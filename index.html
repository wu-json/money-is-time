<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Money is Time</title>
    <meta
      name="description"
      content="See the price of everyday things as the time you'd have to work to afford them."
    />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header__text">
        <h1 class="title">
          <span class="title-line"
            >Time is money<span class="accent">.</span></span
          >
          <span class="title-line title-line--q"
            >But what if money was time<span class="qmark"
              ><span class="qmark-base">?</span
              ><span class="qmark-dot" aria-hidden="true">?</span></span
            ></span
          >
        </h1>
      </div>

      <div class="site-header__art" aria-hidden="true">
        <svg
          class="dollar-bill"
          viewBox="0 0 400 190"
          xmlns="http://www.w3.org/2000/svg"
        >
          <!-- bill body + nested frames -->
          <rect
            x="5"
            y="5"
            width="390"
            height="180"
            rx="16"
            fill="#f3faf5"
            stroke="var(--accent)"
            stroke-width="3"
          />
          <rect
            x="14"
            y="14"
            width="372"
            height="162"
            rx="10"
            fill="none"
            stroke="var(--accent)"
            stroke-width="1.6"
          />
          <rect
            x="19"
            y="19"
            width="362"
            height="152"
            rx="7"
            fill="none"
            stroke="var(--text)"
            stroke-width="0.8"
            opacity="0.45"
          />

          <!-- banners -->
          <text class="bill-text" x="200" y="35">TIME IS MONEY</text>
          <text class="bill-text" x="200" y="162">SIXTY MINUTES</text>

          <!-- corner $ medallions -->
          <g class="bill-corner">
            <circle cx="46" cy="52" r="14" />
            <text x="46" y="58">$</text>
          </g>
          <g class="bill-corner">
            <circle cx="354" cy="52" r="14" />
            <text x="354" y="58">$</text>
          </g>
          <g class="bill-corner">
            <circle cx="46" cy="138" r="14" />
            <text x="46" y="144">$</text>
          </g>
          <g class="bill-corner">
            <circle cx="354" cy="138" r="14" />
            <text x="354" y="144">$</text>
          </g>

          <!-- center clock medallion -->
          <circle
            cx="200"
            cy="95"
            r="48"
            fill="#ffffff"
            stroke="var(--text)"
            stroke-width="3"
          />
          <circle
            cx="200"
            cy="95"
            r="43"
            fill="none"
            stroke="var(--accent)"
            stroke-width="1.5"
          />

          <!-- cardinal ticks -->
          <g
            stroke="var(--accent)"
            stroke-width="2.6"
            stroke-linecap="round"
          >
            <line x1="200" y1="57" x2="200" y2="67" />
            <line x1="238" y1="95" x2="228" y2="95" />
            <line x1="200" y1="133" x2="200" y2="123" />
            <line x1="162" y1="95" x2="172" y2="95" />
          </g>
          <!-- minor ticks -->
          <g stroke="var(--text)" stroke-width="1.3" stroke-linecap="round">
            <line x1="219" y1="62.1" x2="215.5" y2="68.2" />
            <line x1="232.9" y1="76" x2="226.9" y2="79.5" />
            <line x1="232.9" y1="114" x2="226.9" y2="110.5" />
            <line x1="219" y1="127.9" x2="215.5" y2="121.9" />
            <line x1="181" y1="127.9" x2="184.5" y2="121.9" />
            <line x1="167.1" y1="114" x2="173.1" y2="110.5" />
            <line x1="167.1" y1="76" x2="173.1" y2="79.5" />
            <line x1="181" y1="62.1" x2="184.5" y2="68.2" />
          </g>

          <!-- hands -->
          <line
            x1="200"
            y1="95"
            x2="181"
            y2="84"
            stroke="var(--text)"
            stroke-width="4"
            stroke-linecap="round"
          />
          <line
            x1="200"
            y1="95"
            x2="226"
            y2="80"
            stroke="var(--text)"
            stroke-width="2.8"
            stroke-linecap="round"
          />
          <circle cx="200" cy="95" r="3.6" fill="var(--accent)" />
        </svg>
      </div>
    </header>

    <main class="layout">
      <section id="controls" class="panel" aria-label="Your inputs"></section>
      <section id="items" class="grid" aria-label="Goods as time"></section>
      <section
        id="comparison"
        class="panel"
        aria-label="Wealth comparison"
      ></section>
    </main>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
